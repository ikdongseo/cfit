name: Fetch & Score Job Postings

on:
  schedule:
    # 한국시간 기준 07:30, 12:30, 18:30, 22:30 (UTC 기준 -9시간)
    - cron: "30 22,3,9,13 * * *"
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

jobs:
  fetch-and-score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fetch & score script
        env:
          SARAMIN_API_KEY: ${{ secrets.SARAMIN_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-and-score.js

      - name: Commit updated jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --cached --quiet && echo "변경 사항 없음" || git commit -m "chore: update job postings ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push

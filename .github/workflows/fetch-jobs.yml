name: Fetch & Score Job Postings

on:
  schedule:
    - cron: "30 22,3,9,13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fetch & score script
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-and-score.js

      - name: Commit updated jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git fetch origin main
          git rebase origin/main
          git stash pop
          git add data/jobs.json
          git diff --cached --quiet && echo "변경 없음" || git commit -m "chore: update job postings ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push origin main
